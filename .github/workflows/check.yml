name: Monitor concurso

on:
  schedule:
    - cron: "0 * * * *"   # toda hora, no minuto 0 (horário UTC)
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write           # necessário para salvar o estado (state.json)

concurrency:
  group: monitor-concurso
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar verificação
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check.py

      - name: Salvar estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "atualiza estado"
          git push
